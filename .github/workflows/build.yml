name: Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-branch
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          WRAPPED: "1"

      - name: Publish build branch
        run: |
          mv dist "$RUNNER_TEMP/dist"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan build-deployment
          git rm -rf .

          mv "$RUNNER_TEMP/dist"/* .
          git add -A
          git commit -m "Build ${GITHUB_SHA}"
          git push --force origin HEAD:build
